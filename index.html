<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

const SUPABASE_URL = 'https://rttugjwsfmbihrviwbfn.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ0dHVnandzZm1iaWhydml3YmZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzAzODQxMDksImV4cCI6MjA4NTk2MDEwOX0.0Wjf4EswFsqI2lV41yMwqSL2MRe6qQ-k5tFl_Jevgjk';
const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let ownerEmail = '';

// Get logged in user email
supabase.auth.getUser().then(({ data }) => {
  if (data?.user?.email) {
    ownerEmail = data.user.email;
    loadData();
  }
});

/* ═══════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════ */
const state = {
  business: { name: '', timings: '' },
  services: [''],
  faqs: [{ question: '', answer: '' }]
};

const SERVICE_PLACEHOLDERS = [
  'e.g. Hair Cut & Styling',
  'e.g. Deep Tissue Massage',
  'e.g. Facial Treatment',
  'e.g. Nail Art & Manicure',
  'e.g. Waxing & Threading',
  'e.g. Custom Consultation'
];

/* ═══════════════════════════════════════════════
   LOAD FROM SUPABASE
═══════════════════════════════════════════════ */
async function loadData() {
  // Load business info
  const { data: biz } = await supabase
    .from('businesses')
    .select('*')
    .eq('owner_email', ownerEmail)
    .single();

  if (biz) {
    state.business.name    = biz.business_name || '';
    state.business.timings = biz.address || '';
    document.getElementById('biz-name').value    = state.business.name;
    document.getElementById('biz-timings').value = state.business.timings;
  }

  // Load services
  const { data: svcs } = await supabase
    .from('services')
    .select('*')
    .eq('owner_email', ownerEmail);

  if (svcs?.length) {
    state.services = svcs.map(s => s.title + (s.description ? ' — ' + s.description : ''));
  }

  // Load FAQs
  const { data: faqData } = await supabase
    .from('faqs')
    .select('*')
    .eq('owner_email', ownerEmail);

  if (faqData?.length) {
    state.faqs = faqData.map(f => ({ question: f.question, answer: f.answer }));
  }

  renderServices();
  renderFaqs();
  updateOverview();
  updateCounts();
}

/* ═══════════════════════════════════════════════
   NAV
═══════════════════════════════════════════════ */
window.switchSection = function(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-' + id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  const sideBtn = document.querySelector(`.nav-item[data-section="${id}"]`);
  if (sideBtn) sideBtn.classList.add('active');
  else if (btn) btn.classList.add('active');
  document.querySelectorAll('.bn-item').forEach(n => n.classList.remove('active'));
  const bnBtn = document.querySelector(`.bn-item[data-bn="${id}"]`);
  if (bnBtn) bnBtn.classList.add('active');
  closeSidebar();
  updateOverview();
  updateCounts();
  window.scrollTo({ top: 0, behavior: 'smooth' });
};

window.openSidebar = function() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('active');
};
window.closeSidebar = function() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('active');
};

/* ═══════════════════════════════════════════════
   SERVICES
═══════════════════════════════════════════════ */
window.renderServices = function() {
  const list = document.getElementById('service-list');
  list.innerHTML = '';
  state.services.forEach((val, i) => {
    const row = document.createElement('div');
    row.className = 'service-row';
    row.innerHTML = `
      <div class="grip">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="9" cy="5" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="9" cy="19" r="1"/><circle cx="15" cy="5" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="15" cy="19" r="1"/></svg>
      </div>
      <span class="service-num">${i + 1}</span>
      <input type="text" value="${escHtml(val)}"
        placeholder="${SERVICE_PLACEHOLDERS[i % SERVICE_PLACEHOLDERS.length]}"
        oninput="state.services[${i}] = this.value; updateCounts();" />
      <button class="delete-btn" onclick="removeService(${i})" ${state.services.length === 1 ? 'disabled' : ''} title="Remove">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    `;
    list.appendChild(row);
  });
  updateCounts();
};

window.addService = function() {
  state.services.push('');
  renderServices();
  const inputs = document.querySelectorAll('#service-list input');
  if (inputs.length) inputs[inputs.length - 1].focus();
};

window.removeService = function(i) {
  if (state.services.length <= 1) return;
  state.services.splice(i, 1);
  renderServices();
};

/* ═══════════════════════════════════════════════
   FAQS
═══════════════════════════════════════════════ */
let openFaqIndex = 0;

window.renderFaqs = function() {
  const list = document.getElementById('faq-list');
  list.innerHTML = '';
  state.faqs.forEach((faq, i) => {
    const isOpen = openFaqIndex === i;
    const item = document.createElement('div');
    item.className = 'faq-item' + (isOpen ? ' open' : '');
    item.innerHTML = `
      <button class="faq-header" onclick="toggleFaq(${i})">
        <span class="faq-q-num">Q${i + 1}</span>
        <span class="faq-q-preview ${faq.question.trim() ? '' : 'empty'}" id="faq-preview-${i}">
          ${faq.question.trim() ? escHtml(faq.question) : 'Click to edit question…'}
        </span>
        <button class="delete-btn" onclick="event.stopPropagation(); removeFaq(${i})" ${state.faqs.length === 1 ? 'disabled' : ''} title="Remove">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
        <span class="faq-chevron">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
        </span>
      </button>
      <div class="faq-body">
        <div class="field">
          <label class="field-label">Question</label>
          <input type="text" value="${escHtml(faq.question)}"
            placeholder="e.g. Do you offer same-day appointments?"
            oninput="state.faqs[${i}].question = this.value; updateFaqPreview(${i}, this.value);" />
        </div>
        <div class="field" style="margin-bottom:0">
          <label class="field-label">Answer</label>
          <textarea rows="3"
            placeholder="e.g. Yes! We accept same-day bookings depending on availability."
            oninput="state.faqs[${i}].answer = this.value;">${escHtml(faq.answer)}</textarea>
        </div>
      </div>
    `;
    list.appendChild(item);
  });
  updateCounts();
};

window.toggleFaq = function(i) {
  openFaqIndex = openFaqIndex === i ? -1 : i;
  renderFaqs();
  if (openFaqIndex === i) {
    const inputs = document.querySelectorAll(`#faq-list .faq-item:nth-child(${i + 1}) input`);
    if (inputs.length) setTimeout(() => inputs[0].focus(), 50);
  }
};

window.updateFaqPreview = function(i, val) {
  const el = document.getElementById('faq-preview-' + i);
  if (!el) return;
  if (val.trim()) { el.textContent = val; el.classList.remove('empty'); }
  else { el.textContent = 'Click to edit question…'; el.classList.add('empty'); }
  updateCounts();
};

window.addFaq = function() {
  state.faqs.push({ question: '', answer: '' });
  openFaqIndex = state.faqs.length - 1;
  renderFaqs();
  setTimeout(() => {
    const items = document.querySelectorAll('#faq-list .faq-item');
    const last = items[items.length - 1];
    if (last) last.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    const inputs = document.querySelectorAll(`#faq-list .faq-item:last-child input`);
    if (inputs.length) inputs[0].focus();
  }, 60);
};

window.removeFaq = function(i) {
  if (state.faqs.length <= 1) return;
  state.faqs.splice(i, 1);
  openFaqIndex = Math.min(openFaqIndex, state.faqs.length - 1);
  renderFaqs();
};

/* ═══════════════════════════════════════════════
   SAVE TO SUPABASE
═══════════════════════════════════════════════ */
window.saveSection = async function(section) {
  if (!ownerEmail) { alert('Not logged in.'); return; }

  const btn = document.querySelector(`#section-${section} .save-btn`);
  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  if (section === 'business') {
    state.business.name    = document.getElementById('biz-name').value;
    state.business.timings = document.getElementById('biz-timings').value;

    await supabase.from('businesses').upsert({
      owner_email:   ownerEmail,
      business_name: state.business.name,
      address:       state.business.timings,
    }, { onConflict: 'owner_email' });
  }

  if (section === 'services') {
    await supabase.from('services').delete().eq('owner_email', ownerEmail);
    const rows = state.services
      .filter(s => s.trim())
      .map(s => ({ owner_email: ownerEmail, title: s }));
    if (rows.length) await supabase.from('services').insert(rows);
  }

  if (section === 'faqs') {
    await supabase.from('faqs').delete().eq('owner_email', ownerEmail);
    const rows = state.faqs
      .filter(f => f.question.trim())
      .map(f => ({ owner_email: ownerEmail, question: f.question, answer: f.answer }));
    if (rows.length) await supabase.from('faqs').insert(rows);
  }

  if (btn) { btn.disabled = false; btn.textContent = 'Save Changes'; }

  updateOverview();
  updateCounts();
  const el = document.getElementById('confirm-' + section);
  el.classList.add('visible');
  setTimeout(() => el.classList.remove('visible'), 3000);
};

/* ═══════════════════════════════════════════════
   SIGN OUT
═══════════════════════════════════════════════ */
window.signOut = async function() {
  await supabase.auth.signOut();
  window.location.href = 'https://loginpage-pearl-one.vercel.app';
};

/* ═══════════════════════════════════════════════
   COUNTS + OVERVIEW
═══════════════════════════════════════════════ */
window.updateCounts = function() {
  const sCount = state.services.filter(s => s.trim()).length;
  const fCount = state.faqs.filter(f => f.question.trim()).length;
  document.getElementById('services-count').textContent = sCount + ' added';
  document.getElementById('faqs-count').textContent = fCount + ' question' + (fCount !== 1 ? 's' : '');
};

window.updateOverview = function() {
  const name = document.getElementById('biz-name')?.value || state.business.name;
  const sCount = state.services.filter(s => s.trim()).length;
  const fCount = state.faqs.filter(f => f.question.trim()).length;
  const ovName = document.getElementById('ov-name');
  if (ovName) ovName.textContent = name.trim() || '—';
  const ovS = document.getElementById('ov-services');
  if (ovS) ovS.textContent = sCount;
  const ovF = document.getElementById('ov-faqs');
  if (ovF) ovF.textContent = fCount;
};

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
renderServices();
renderFaqs();
updateOverview();
updateCounts();
</script>
